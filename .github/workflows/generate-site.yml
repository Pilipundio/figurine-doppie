name: Generate collection pages

on:
  push:
    branches:
      - main
    paths:
      - "catalogo.csv"
      - "generate_site.py"
      - "style.css"
      - ".github/workflows/generate-site.yml"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate collection pages and sitemap
        run: python generate_site.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add collezioni sitemap.xml

          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare."
          else
            git commit -m "Aggiorna pagine collezioni e sitemap"
            git push
          fi
