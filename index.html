<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figurine Doppie - Luigi</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            margin:0;
        }

        header{
            background:#1565c0;
            color:white;
            padding:25px;
            text-align:center;
        }

        h1{
            margin:0;
        }

        .container{
            max-width:1200px;
            margin:auto;
            padding:20px;
        }

        #search{
            width:100%;
            padding:12px;
            font-size:18px;
            border-radius:8px;
            border:1px solid #ccc;
            margin-bottom:20px;
            box-sizing:border-box;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th{
            background:#1976d2;
            color:white;
            padding:12px;
            text-align:left;
        }

        td{
            padding:10px;
            border-bottom:1px solid #eee;
        }

        tr:hover{
            background:#f0f7ff;
        }
    </style>
</head>

<body>

<header>
    <h1>⚽ Figurine Doppie</h1>
    <p>Archivio personale di Luigi</p>
</header>

<div class="container">

<input
id="search"
type="text"
placeholder="🔍 Cerca giocatore, squadra, collezione...">

<table>

<thead>

<tr>
<th>Numero</th>
<th>Soggetto</th>
<th>Squadra</th>
<th>Collezione</th>
<th>Qtà</th>
</tr>

</thead>

<tbody>

<tr>
<td>275</td>
<td>Faustino Asprilla</td>
<td>Parma</td>
<td>Calciatori 1994-1995</td>
<td>2</td>
</tr>

<tr>
<td>125</td>
<td>Kylian Mbappé</td>
<td>Francia</td>
<td>FFF Tournament Edition 2024</td>
<td>1</td>
</tr>

<tr>
<td>377</td>
<td>Christian Pulisic</td>
<td>Milan</td>
<td>Calciatori Adrenalyn XL 2023-2024</td>
<td>3</td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
