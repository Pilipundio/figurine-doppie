<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Figurine Doppie</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <h1>Catalogo Figurine</h1>
  </header>

  <div class="container">

    <input id="search" placeholder="Cerca giocatore, squadra, collezione..." />

    <table id="table">
      <thead>
        <tr>
          <th>Soggetto</th>
          <th>Squadra</th>
          <th>Collezione</th>
          <th>Anno</th>
          <th>Numero</th>
          <th>Quantità</th>
          <th>Condizione</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
