<main class="container">

    <h2>Richiedi figurine</h2>

    <p>
        Compila il modulo indicando la collezione e i numeri delle figurine che stai cercando.
        Riceverai una risposta con disponibilità e preventivo.
    </p>

    <form class="requestForm">

        <label>Nome</label>
        <input type="text" placeholder="Il tuo nome">

        <label>Email</label>
        <input type="email" placeholder="nome@email.it">

        <label>Collezione</label>
        <input type="text" placeholder="Es. Calciatori 2005-2006">

        <label>Numeri richiesti</label>
        <textarea rows="6" placeholder="Es. 12, 45, 118, 256..."></textarea>

        <button class="button" type="button">
            Invia richiesta
        </button>

    </form>

</main>
