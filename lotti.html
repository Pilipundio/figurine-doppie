    <section class="hero">

    <h2>Lotti disponibili</h2>

    <p>
        Consulta tutte le collezioni disponibili e scopri quante figurine o card diverse sono presenti per ciascun lotto.
    </p>

</section>
    
<div class="container">

    

    <table id="lottiTable">

        <thead>
            <tr>
                <th>Collezione</th>
                <th>Editore</th>
                <th>Anno</th>
                <th>Figurine/Card diverse</th>
            </tr>
        </thead>

        <tbody></tbody>

    </table>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>

let lotti = [];
let sortColumn = "";
let sortAsc = true;

document.addEventListener("DOMContentLoaded", () => {

    Papa.parse("lotti.csv?v=" + Date.now(), {

        download: true,
        header: true,
        skipEmptyLines: true,
        transformHeader: h => h.trim(),

        complete: function(results) {

            lotti = results.data;

            renderTable();

            enableSorting();

        }

    });

});

function renderTable() {

    const tbody = document.querySelector("#lottiTable tbody");

    tbody.innerHTML = "";

    lotti.forEach(row => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.Collezione || ""}</td>
            <td>${row.Editore || ""}</td>
            <td>${row.Anno || ""}</td>
            <td style="text-align:center;">${row.Diverse || ""}</td>
        `;

        tbody.appendChild(tr);

    });

}

function enableSorting() {

    const columns = [
        "Collezione",
        "Editore",
        "Anno",
        "Diverse"
    ];

    document.querySelectorAll("#lottiTable th").forEach((th, index) => {

        th.addEventListener("click", () => {

            const key = columns[index];

            if (sortColumn === key) {
                sortAsc = !sortAsc;
            } else {
                sortColumn = key;
                sortAsc = true;
            }

            lotti.sort((a, b) => {

                let x = a[key] || "";
                let y = b[key] || "";

                const nx = Number(x);
                const ny = Number(y);

                if (!isNaN(nx) && !isNaN(ny)) {
                    return sortAsc ? nx - ny : ny - nx;
                }

                return sortAsc
                    ? x.localeCompare(y, "it")
                    : y.localeCompare(x, "it");

            });

            renderTable();

            updateHeaderIcons();

        });

    });

}

function updateHeaderIcons() {

    const headers = document.querySelectorAll("#lottiTable th");

    headers.forEach(th => {

        th.textContent = th.textContent.replace(" ▲","").replace(" ▼","");

    });

    const columns = [
    "Collezione",
    "Editore",
    "Anno",
    "Diverse"
];

    const index = columns.indexOf(sortColumn);

    if(index >= 0){

        headers[index].textContent += sortAsc ? " ▲" : " ▼";

    }

}

</script>
